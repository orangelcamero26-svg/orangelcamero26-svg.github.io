<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shell - Base de Datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0f1117; color: #f0f2f8; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #B01519, #DD1D21); border-bottom: 2.5px solid #FBCF09; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 20px rgba(221,29,33,0.4); }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-icon { width: 40px; height: 40px; background: #FBCF09; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .header-title { font-size: 18px; font-weight: 800; }
        .header-sub { font-size: 12px; color: rgba(255,255,255,0.65); }
        .back-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; font-weight: 600; }
        .toolbar { padding: 14px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #1a1d26; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .search-input { background: #252836; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 8px; color: #f0f2f8; font-family: inherit; font-size: 14px; padding: 8px 14px; width: 240px; outline: none; }
        .search-input:focus { border-color: #DD1D21; }
        .btn-toolbar { background: #252836; border: 1.5px solid rgba(255,255,255,0.08); color: #f0f2f8; font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn-toolbar.green { border-color: rgba(34,197,94,0.4); color: #22c55e; }
        .total-reg { margin-left: auto; font-size: 13px; color: #5a6080; font-weight: 600; }
        .table-wrap { overflow-x: auto; padding: 20px 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1100px; }
        thead th { background: #1a1d26; color: #8a90a8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.06); white-space: nowrap; }
        thead th.th-r { text-align: right; }
        tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        td { padding: 10px 12px; vertical-align: middle; }
        tfoot tr { background: #1a1d26; border-top: 2px solid rgba(251,207,9,0.3); }
        tfoot td { padding: 11px 12px; font-size: 12px; font-weight: 800; color: #FBCF09; }
        .td-num { color: #5a6080; font-size: 11px; }
        .td-bold { font-weight: 600; }
        .td-c { text-align: center; }
        .td-r { text-align: right; }
        .td-yellow { color: #FBCF09; font-weight: 700; }
        .td-fecha { color: #5a6080; font-size: 11px; white-space: nowrap; }
        .pos { color: #22c55e; font-weight: 800; }
        .neg { color: #ef4444; font-weight: 800; }
        .cero { color: #FBCF09; font-weight: 800; }
        .badge { background: rgba(221,29,33,0.2); color: #ff6b6b; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 800; }
        .btn-ic { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 6px; }
        .btn-ic:hover { background: rgba(255,255,255,0.08); }
        #carga { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px; color: #5a6080; font-size: 14px; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(221,29,33,0.2); border-top-color: #DD1D21; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #modal.open { display: flex; }
        .mbox { background: #1a1d26; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; width: 100%; max-width: 640px; max-height: 85vh; overflow-y: auto; padding: 24px; }
        .mhead { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .mtitle { font-size: 17px; font-weight: 800; }
        .msub { font-size: 12px; color: #8a90a8; margin-top: 3px; }
        .mbtn-x { background: rgba(255,255,255,0.08); border: none; color: #f0f2f8; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .dgrid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
        .dcard { background: #252836; border-radius: 10px; padding: 12px; text-align: center; }
        .dlabel { font-size: 11px; color: #5a6080; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
        .dval { font-size: 18px; font-weight: 800; }
        .dsec { font-size: 13px; font-weight: 700; color: #8a90a8; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .dtable { width: 100%; border-collapse: collapse; font-size: 13px; }
        .dtable th { background: #252836; color: #8a90a8; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 8px 10px; text-align: left; }
        .dtable td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon">&#128738;</div>
        <div>
            <div class="header-title">Shell &mdash; Base de Datos</div>
            <div class="header-sub">Historial de Rendiciones</div>
        </div>
    </div>
    <a href="index.html" class="back-link">&larr; Volver a la App</a>
</div>

<div class="toolbar">
    <input type="text" class="search-input" id="buscador" placeholder="Buscar por nombre, fecha o turno..." oninput="filtrar()" />
    <button class="btn-toolbar" onclick="cargarDatos()">Actualizar</button>
    <button class="btn-toolbar green" onclick="exportarCSV()">Exportar CSV</button>
    <span class="total-reg" id="total-reg"></span>
</div>

<div id="carga"><div class="spinner"></div><span>Conectando con Firebase...</span></div>

<div id="table-wrap" class="table-wrap" style="display:none">
    <table>
        <thead>
            <tr>
                <th>#</th><th>Fecha</th><th>Nombre</th><th class="td-c">Turno</th>
                <th class="th-r">Total Islas</th><th class="th-r">Efectivo</th>
                <th class="th-r">Creditos</th><th class="th-r">Tarjetas</th>
                <th class="th-r">Shell Card</th><th class="th-r">App Shell</th>
                <th class="th-r">Total Recaudado</th><th class="th-r">Diferencia</th>
                <th>Guardado</th><th class="td-c">Ver / Borrar</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot>
            <tr>
                <td colspan="4">TOTALES</td>
                <td class="td-r" id="s-islas">$0</td><td class="td-r" id="s-dep">$0</td>
                <td class="td-r" id="s-cred">$0</td><td class="td-r" id="s-tar">$0</td>
                <td class="td-r" id="s-sc">$0</td><td class="td-r" id="s-ap">$0</td>
                <td class="td-r" id="s-tot">$0</td><td class="td-r" id="s-dif">$0</td>
                <td colspan="2"></td>
            </tr>
        </tfoot>
    </table>
</div>

<div id="modal" onclick="if(event.target===this)cerrarModal()">
    <div class="mbox"><div id="mcontent"></div></div>
</div>

<!-- Firebase SDK version 9.23.0 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
    apiKey: "AIzaSyD84fWd7QcNIggcRapw1rnqSDj8n8",
    authDomain: "shell-rendicion.firebaseapp.com",
    projectId: "shell-rendicion",
    storageBucket: "shell-rendicion.firebasestorage.app",
    messagingSenderId: "210880588861",
    appId: "1:210880588861:web:60d3248e25e2853ba88e54"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var todos = [];

function fmt(n) { return '$' + Math.floor(Number(n||0)).toLocaleString('es-CL'); }
function fmtD(n) { var v=Math.floor(Number(n||0)); if(v>0) return '+$'+v.toLocaleString('es-CL'); if(v<0) return '-$'+Math.abs(v).toLocaleString('es-CL'); return '$0'; }
function dc(n) { var v=Number(n||0); return v<0?'neg':v>0?'pos':'cero'; }

function cargarDatos() {
    document.getElementById('carga').innerHTML = '<div class="spinner"></div><span>Cargando registros...</span>';
    document.getElementById('carga').style.display = 'flex';
    document.getElementById('table-wrap').style.display = 'none';

    db.collection("rendiciones").orderBy("fechaGuardado","desc").get()
        .then(function(snap) {
            todos = [];
            snap.forEach(function(d) { todos.push(Object.assign({id:d.id}, d.data())); });
            renderTabla(todos);
        })
        .catch(function(e) {
            document.getElementById('carga').innerHTML = '<p style="color:#ef4444">Error: '+e.message+'</p>';
            console.error(e);
        });
}

function renderTabla(lista) {
    document.getElementById('carga').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';
    document.getElementById('total-reg').textContent = lista.length + ' registros';
    var tbody = document.getElementById('tbody');
    if (!lista.length) {
        tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;color:#5a6080;padding:40px">Sin registros</td></tr>';
        actualizarTotales([]);
        return;
    }
    tbody.innerHTML = lista.map(function(r,i) {
        var ts = r.fechaGuardado && r.fechaGuardado.toDate ? r.fechaGuardado.toDate().toLocaleString('es-CL') : '-';
        return '<tr>'+
            '<td class="td-num">'+(lista.length-i)+'</td>'+
            '<td>'+(r.fecha||'-')+'</td>'+
            '<td class="td-bold">'+(r.nombre||'-')+'</td>'+
            '<td class="td-c"><span class="badge">T'+(r.turno||'-')+'</span></td>'+
            '<td class="td-r">'+fmt(r.totalIslas)+'</td>'+
            '<td class="td-r">'+fmt(r.totalDepositos)+'</td>'+
            '<td class="td-r">'+fmt(r.totalCreditos)+'</td>'+
            '<td class="td-r">'+fmt(r.totalTarjetas)+'</td>'+
            '<td class="td-r">'+fmt(r.totalShellCard)+'</td>'+
            '<td class="td-r">'+fmt(r.totalAppShell)+'</td>'+
            '<td class="td-r td-yellow">'+fmt(r.totalRecaudado)+'</td>'+
            '<td class="td-r '+dc(r.diferencia)+'">'+fmtD(r.diferencia)+'</td>'+
            '<td class="td-fecha">'+ts+'</td>'+
            '<td class="td-c">'+
                '<button class="btn-ic" onclick="verDetalle(\''+r.id+'\')">&#128065;</button>'+
                '<button class="btn-ic" onclick="borrar(\''+r.id+'\')" style="color:#ef4444">&#128465;</button>'+
            '</td>'+
        '</tr>';
    }).join('');
    actualizarTotales(lista);
}

function actualizarTotales(lista) {
    function s(k) { return lista.reduce(function(a,r){return a+Number(r[k]||0);},0); }
    document.getElementById('s-islas').textContent = fmt(s('totalIslas'));
    document.getElementById('s-dep').textContent   = fmt(s('totalDepositos'));
    document.getElementById('s-cred').textContent  = fmt(s('totalCreditos'));
    document.getElementById('s-tar').textContent   = fmt(s('totalTarjetas'));
    document.getElementById('s-sc').textContent    = fmt(s('totalShellCard'));
    document.getElementById('s-ap').textContent    = fmt(s('totalAppShell'));
    document.getElementById('s-tot').textContent   = fmt(s('totalRecaudado'));
    var d=s('diferencia'); var el=document.getElementById('s-dif');
    el.textContent=fmtD(d); el.className='td-r '+dc(d);
}

function borrar(id) {
    if (!confirm('Eliminar este registro permanentemente?')) return;
    db.collection("rendiciones").doc(id).delete()
        .then(function() { todos=todos.filter(function(r){return r.id!==id;}); renderTabla(todos); })
        .catch(function(e) { alert('Error: '+e.message); });
}

function verDetalle(id) {
    var r=null;
    for(var i=0;i<todos.length;i++){if(todos[i].id===id){r=todos[i];break;}}
    if(!r) return;
    var islas=(r.islas||[]).map(function(x){return '<tr><td>Isla '+x.isla+'</td><td>'+fmt(x.combustible)+'</td><td>'+fmt(x.lubricantes)+'</td><td>'+fmt(x.otros)+'</td></tr>';}).join('');
    var pagos=['creditos','tarjetas','copiloto','shellcard','appshell'].map(function(t){return (r[t]||[]).map(function(p){return '<tr><td>'+t+'</td><td>'+(p.descripcion||'-')+'</td><td>'+fmt(p.valor)+'</td></tr>';}).join('');}).join('');
    document.getElementById('mcontent').innerHTML =
        '<div class="mhead"><div><div class="mtitle">Rendicion - '+(r.fecha||'-')+'</div><div class="msub">'+(r.nombre||'-')+' - Turno '+(r.turno||'-')+'</div></div>'+
        '<button class="mbtn-x" onclick="cerrarModal()">X</button></div>'+
        '<div class="dgrid">'+
            '<div class="dcard"><div class="dlabel">Total Ventas</div><div class="dval" style="color:#FBCF09">'+fmt(r.totalIslas)+'</div></div>'+
            '<div class="dcard"><div class="dlabel">Total Recaudado</div><div class="dval">'+fmt(r.totalRecaudado)+'</div></div>'+
            '<div class="dcard"><div class="dlabel">Diferencia</div><div class="dval '+dc(r.diferencia)+'">'+fmtD(r.diferencia)+'</div></div>'+
        '</div>'+
        '<div class="dsec">Islas</div>'+
        '<table class="dtable"><thead><tr><th>Isla</th><th>Combustible</th><th>Lubricantes</th><th>Otros</th></tr></thead><tbody>'+(islas||'<tr><td colspan="4" style="text-align:center;color:#5a6080">Sin datos</td></tr>')+'</tbody></table>'+
        '<div class="dsec">Pagos</div>'+
        '<table class="dtable"><thead><tr><th>Tipo</th><th>Descripcion</th><th>Valor</th></tr></thead><tbody>'+(pagos||'<tr><td colspan="3" style="text-align:center;color:#5a6080">Sin datos</td></tr>')+'</tbody></table>'+
        (r.observaciones?'<div class="dsec">Observaciones</div><p style="color:#8a90a8;font-size:14px">'+r.observaciones+'</p>':'');
    document.getElementById('modal').classList.add('open');
}

function cerrarModal() { document.getElementById('modal').classList.remove('open'); }

function filtrar() {
    var q=document.getElementById('buscador').value.toLowerCase();
    renderTabla(todos.filter(function(r){
        return (r.nombre||'').toLowerCase().indexOf(q)>=0 || (r.fecha||'').indexOf(q)>=0 || String(r.turno||'').indexOf(q)>=0;
    }));
}

function exportarCSV() {
    if(!todos.length){alert('No hay datos');return;}
    var cols=['Fecha','Nombre','Turno','N Empleado','Total Islas','Efectivo','Creditos','Tarjetas','Shell Card','App Shell','Total Recaudado','Diferencia','Observaciones'];
    var rows=todos.map(function(r){return [r.fecha,r.nombre,r.turno,r.numero,r.totalIslas,r.totalDepositos,r.totalCreditos,r.totalTarjetas,r.totalShellCard,r.totalAppShell,r.totalRecaudado,r.diferencia,r.observaciones].map(function(v){return '"'+(v||'')+'"';}).join(',');});
    var a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent([cols.join(',')].concat(rows).join('\n'));
    a.download='rendiciones-shell.csv'; a.click();
}

window.onload = cargarDatos;
</script>
</body>
</html>
