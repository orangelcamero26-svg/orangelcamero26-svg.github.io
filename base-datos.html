<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Estación Digital — Panel de Auditoría</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme:{
        extend:{
          fontFamily:{ sans:['Inter','system-ui','sans-serif'] },
          colors:{
            brand:{ 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
            surface:{ 0:'#05080f',1:'#0a0f1a',2:'#0f1624',3:'#15202e',4:'#1c2b3a' }
          }
        }
      }
    }
  </script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    *{ -webkit-tap-highlight-color:transparent; }
    body{ background:#05080f; color:#e2e8f0; }
    ::-webkit-scrollbar{ width:4px; height:4px; } ::-webkit-scrollbar-track{ background:transparent; } ::-webkit-scrollbar-thumb{ background:#1c2b3a; border-radius:4px; }
    .input-field:focus{ outline:none; border-color:#60a5fa; box-shadow:0 0 0 3px rgba(96,165,250,.15); }
    /* Login card shine */
    .login-card::before{ content:''; position:absolute; top:0; left:15%; right:15%; height:1px; background:linear-gradient(90deg,transparent,rgba(96,165,250,.4),transparent); }
    /* Table row hover */
    .data-row:hover { background:rgba(96,165,250,.04); }
    /* Badge states */
    .pos{ color:#10b981; font-weight:700; } .neg{ color:#ef4444; font-weight:700; } .cero{ color:#f59e0b; font-weight:700; }
    /* Filter active */
    .filter-chip.active{ background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.4); color:#93c5fd; }
    /* Overlay fade */
    .modal-overlay{ animation:fadeIn .18s ease; }
    @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
    /* Panel enter */
    .panel-enter{ animation:panelIn .2s ease; }
    @keyframes panelIn{ from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    /* Sort indicator */
    th.sortable:hover{ color:#93c5fd; cursor:pointer; }
    th.sort-asc::after{ content:' ↑'; color:#60a5fa; }
    th.sort-desc::after{ content:' ↓'; color:#60a5fa; }
    /* Spinner */
    .spinner{ border:2px solid rgba(96,165,250,.2); border-top-color:#60a5fa; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin{ to{transform:rotate(360deg)} }
  </style>
</head>
<body class="font-sans min-h-screen">

<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="fixed inset-0 flex items-center justify-center p-6 z-50 bg-surface-0" style="background-image:linear-gradient(rgba(96,165,250,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,.03) 1px,transparent 1px);background-size:40px 40px;">
  <div class="login-card relative bg-[#0a0f1a] border border-white/10 rounded-3xl p-8 w-full max-w-sm shadow-2xl overflow-hidden">
    <!-- Logo -->
    <div class="relative w-24 h-24 mx-auto mb-5">
      <div class="absolute inset-0 bg-brand-400/10 rounded-2xl blur-xl"></div>
      <img src="Gemini_Generated_Image_4925qt4925qt4925.png" alt="Logo" class="relative w-full h-full object-contain rounded-2xl z-10"/>
    </div>

    <h1 class="text-xl font-800 text-center text-slate-100 tracking-tight mb-1">Estación Digital</h1>
    <p class="text-sm text-slate-500 text-center mb-5">Panel de Auditoría · Admin</p>
    <div class="inline-flex items-center gap-1.5 bg-brand-400/10 border border-brand-400/25 text-brand-300 text-[11px] font-700 px-3 py-1 rounded-full mx-auto mb-6 flex w-fit">
      🔒 Acceso Administrador
    </div>

    <div class="space-y-3">
      <input type="email" id="login-email" placeholder="Correo electrónico"
        class="input-field w-full bg-[#0f1624] border border-white/8 rounded-xl text-slate-200 text-sm px-4 py-3 transition-all placeholder-slate-600"/>
      <input type="password" id="login-password" placeholder="Contraseña"
        class="input-field w-full bg-[#0f1624] border border-white/8 rounded-xl text-slate-200 text-sm px-4 py-3 transition-all placeholder-slate-600"
        onkeydown="if(event.key==='Enter')Auth.login()"/>
      <button onclick="Auth.login()"
        class="w-full bg-brand-600 hover:bg-brand-700 text-white font-700 text-sm py-3.5 rounded-xl shadow-lg shadow-brand-600/25 active:scale-[.98] transition-all">
        Ingresar al Sistema
      </button>
    </div>
    <p id="login-error" class="hidden text-red-400 text-xs text-center mt-3 font-500"></p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app-screen" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-[#0a0f1a]/95 backdrop-blur-md border-b border-white/8 px-6 py-3.5 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 overflow-hidden rounded-lg flex-shrink-0">
        <img src="Gemini_Generated_Image_4925qt4925qt4925.png" alt="Logo" class="w-full h-full object-contain"/>
      </div>
      <div>
        <div class="text-sm font-700 text-slate-100">Estación Digital</div>
        <div class="text-[10px] text-slate-500">Panel de Auditoría</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-2 bg-[#0f1624] border border-white/8 rounded-full px-3 py-1.5">
        <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div>
        <span id="user-display" class="text-[11px] font-600 text-slate-400"></span>
      </div>
      <button onclick="Auth.logout()" class="text-xs text-slate-500 border border-white/10 rounded-lg px-3 py-2 hover:bg-[#0f1624] transition-colors font-500">Salir</button>
    </div>
  </header>

  <!-- Banner bienvenida -->
  <div id="welcome-banner" class="hidden bg-gradient-to-r from-brand-800 to-brand-600 border-b border-brand-500/30 text-sm font-600 text-white text-center py-2.5 px-4">
    <span id="welcome-text"></span>
  </div>

  <!-- ── TOOLBAR & FILTERS ── -->
  <div class="bg-[#0a0f1a] border-b border-white/8 px-6 py-4">
    <!-- Row 1: search + export -->
    <div class="flex flex-wrap gap-3 items-center mb-3">
      <div class="relative flex-1 min-w-[200px]">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">🔍</span>
        <input type="text" id="f-nombre" placeholder="Buscar empleado…" oninput="Filters.aplicar()"
          class="input-field w-full bg-[#0f1624] border border-white/8 rounded-xl text-slate-200 text-sm pl-9 pr-4 py-2.5 transition-all placeholder-slate-600"/>
      </div>
      <button onclick="Data.cargar()" class="flex items-center gap-1.5 bg-[#0f1624] border border-white/10 text-slate-400 text-sm font-500 px-3.5 py-2.5 rounded-xl hover:bg-[#15202e] transition-colors">
        <span id="reload-icon">🔄</span> Actualizar
      </button>
      <button onclick="Data.exportarCSV()" class="flex items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/25 text-emerald-400 text-sm font-600 px-3.5 py-2.5 rounded-xl hover:bg-emerald-500/15 transition-colors">
        📥 Exportar CSV
      </button>
    </div>
    <!-- Row 2: chips -->
    <div class="flex flex-wrap gap-2 items-center">
      <span class="text-[10px] font-700 text-slate-600 uppercase tracking-wider">Filtrar:</span>

      <select id="f-mes" onchange="Filters.aplicar()"
        class="input-field bg-[#0f1624] border border-white/8 rounded-lg text-slate-300 text-xs px-3 py-1.5 transition-all">
        <option value="">Todos los meses</option>
        <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
        <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
        <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
        <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>

      <select id="f-año" onchange="Filters.aplicar()"
        class="input-field bg-[#0f1624] border border-white/8 rounded-lg text-slate-300 text-xs px-3 py-1.5 transition-all">
        <option value="">Todos los años</option>
        <option value="2025">2025</option><option value="2026">2026</option>
      </select>

      <select id="f-estado" onchange="Filters.aplicar()"
        class="input-field bg-[#0f1624] border border-white/8 rounded-lg text-slate-300 text-xs px-3 py-1.5 transition-all">
        <option value="">Todos los estados</option>
        <option value="cuadrado">✅ Cuadrado</option>
        <option value="faltante">⚠️ Faltante</option>
        <option value="sobrante">💰 Sobrante</option>
      </select>

      <button onclick="Filters.limpiar()" class="text-[11px] text-slate-600 hover:text-slate-400 underline transition-colors ml-1">Limpiar</button>
      <span id="total-reg" class="ml-auto text-[11px] text-slate-600 tabular-nums"></span>
    </div>
  </div>

  <!-- ── KPI RESUMEN ── -->
  <div id="resumen-container" class="px-6 py-4 grid grid-cols-2 sm:grid-cols-4 gap-3"></div>

  <!-- ── LOADING ── -->
  <div id="loading" class="hidden flex-col items-center py-16 gap-3">
    <div class="spinner w-7 h-7"></div>
    <p class="text-sm text-slate-600">Cargando registros…</p>
  </div>

  <!-- ── EMPTY STATE ── -->
  <div id="empty-state" class="hidden flex-col items-center py-20 gap-3">
    <span class="text-4xl">🗂</span>
    <p class="text-sm text-slate-500 font-500">No se encontraron registros</p>
    <p class="text-xs text-slate-600">Ajusta los filtros o carga nuevos datos</p>
  </div>

  <!-- ── TABLE ── -->
  <div class="flex-1 overflow-auto px-6 pb-8" id="table-wrap">
    <div class="min-w-[800px]">
      <table class="w-full text-sm border-collapse" id="main-table">
        <thead class="sticky top-0 z-10">
          <tr class="bg-[#0a0f1a] border-b border-white/8">
            <th class="sortable text-left px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider whitespace-nowrap" data-col="fecha" onclick="Data.sortBy('fecha')">Fecha</th>
            <th class="sortable text-left px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider" data-col="nombre" onclick="Data.sortBy('nombre')">Empleado</th>
            <th class="text-left px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider">Turno</th>
            <th class="sortable text-right px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider" data-col="totalIslas" onclick="Data.sortBy('totalIslas')">Venta</th>
            <th class="text-right px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider">Recaudado</th>
            <th class="sortable text-right px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider" data-col="diferencia" onclick="Data.sortBy('diferencia')">Diferencia</th>
            <th class="text-center px-4 py-3 text-[10px] font-700 text-slate-500 uppercase tracking-wider">Estado</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-white/5"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══ MODAL DETALLE ═══ -->
<div id="modal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
  <div class="modal-overlay absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="Modal.cerrar()"></div>
  <div class="relative bg-[#0a0f1a] border border-white/10 rounded-2xl w-full max-w-md shadow-2xl panel-enter max-h-[90vh] overflow-y-auto" id="modal-content"></div>
</div>

<script>
/* ───────────────────────────────────
   Firebase init
─────────────────────────────────── */
firebase.initializeApp({
  apiKey:"AIzaSyDt0K2X84fWd7QcN1ggxRapw1rnqSDj8n8",
  authDomain:"shell-rendicion.firebaseapp.com",
  projectId:"shell-rendicion",
  storageBucket:"shell-rendicion.firebasestorage.app",
  messagingSenderId:"210880588861",
  appId:"1:210880588861:web:60d3248e25e2853ba88e54"
});
const db = firebase.firestore();
const auth = firebase.auth();

/* ───────────────────────────────────
   Formatters
─────────────────────────────────── */
const Fmt = {
  money(n){ return '$'+Math.floor(Number(n||0)).toLocaleString('es-CL'); },
  diff(n){
    const v=Math.floor(Number(n||0));
    return (v>0?'+':'')+v.toLocaleString('es-CL');
  },
  diffClass(n){ return n<0?'neg':n>0?'pos':'cero'; },
  estado(n){
    if(n<0) return { label:'⚠️ Faltante', cls:'bg-red-500/10 text-red-400 border border-red-500/20' };
    if(n>0) return { label:'💰 Sobrante', cls:'bg-amber-500/10 text-amber-400 border border-amber-500/20' };
    return { label:'✅ Cuadrado', cls:'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' };
  }
};

/* ───────────────────────────────────
   Auth Module
─────────────────────────────────── */
const Auth = {
  async login(){
    const email=document.getElementById('login-email').value;
    const pass=document.getElementById('login-password').value;
    const err=document.getElementById('login-error');
    err.classList.add('hidden');
    try { await auth.signInWithEmailAndPassword(email,pass); }
    catch(e){ err.textContent='Credenciales incorrectas.'; err.classList.remove('hidden'); }
  },
  logout(){ auth.signOut(); }
};

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('user-display').textContent=user.email.split('@')[0].toUpperCase();
    // Bienvenida
    const banner=document.getElementById('welcome-banner');
    document.getElementById('welcome-text').textContent=`👋 Bienvenido, ${user.email.split('@')[0].toUpperCase()}`;
    banner.classList.remove('hidden');
    setTimeout(()=>{ banner.style.opacity='0'; banner.style.transition='opacity .8s'; setTimeout(()=>banner.classList.add('hidden'),800); },4000);
    Data.cargar();
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }
});

/* ───────────────────────────────────
   Schema — Estado de rendición
   Relaciones normalizadas en JS:
   rendicion {
     id, fecha, nombre, turno, clave,
     totalIslas, totalRecaudado, diferencia,
     islas[], pagos{ creditos[], tarjetas[], copiloto[], shellcard[], appshell[] }
   }
─────────────────────────────────── */
const DB = {
  // Índice principal: array de rendiciones
  todos: [],
  // Índice secundario: por clave (fecha+nombre+turno) → evita duplicados en UI
  byKey: new Map(),

  ingest(docs){
    this.todos=[];
    this.byKey.clear();
    docs.forEach(d=>{
      const r={ id:d.id, ...d.data() };
      this.todos.push(r);
      const k=`${r.fecha}_${r.nombre}_${r.turno}`;
      this.byKey.set(k,r);
    });
  }
};

/* ───────────────────────────────────
   Data Module
─────────────────────────────────── */
const Data = {
  sortCol:'fechaGuardado',
  sortDir:-1, // -1=desc, 1=asc

  async cargar(){
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('loading').classList.add('flex');
    document.getElementById('table-wrap').classList.add('hidden');
    const icon=document.getElementById('reload-icon');
    icon.style.animation='spin .6s linear infinite';
    try {
      const snap=await db.collection("rendiciones").orderBy("fechaGuardado","desc").get();
      DB.ingest(snap.docs);
      Filters.aplicar();
    } catch(e){ console.error(e); }
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('loading').classList.remove('flex');
    document.getElementById('table-wrap').classList.remove('hidden');
    icon.style.animation='';
  },

  sortBy(col){
    if(this.sortCol===col){ this.sortDir*=-1; } else { this.sortCol=col; this.sortDir=-1; }
    document.querySelectorAll('th.sortable').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
    const th=document.querySelector(`th[data-col="${col}"]`);
    if(th) th.classList.add(this.sortDir===1?'sort-asc':'sort-desc');
    Filters.aplicar();
  },

  render(lista){
    const tbody=document.getElementById('tbody');
    const empty=document.getElementById('empty-state');
    document.getElementById('total-reg').textContent=lista.length+' registro'+(lista.length!==1?'s':'');

    if(lista.length===0){
      tbody.innerHTML='';
      empty.classList.remove('hidden'); empty.classList.add('flex');
      return;
    }
    empty.classList.add('hidden'); empty.classList.remove('flex');

    tbody.innerHTML=lista.map(r=>{
      const est=Fmt.estado(r.diferencia);
      return `<tr class="data-row transition-colors cursor-pointer" onclick="Modal.abrir('${r.id}')">
        <td class="px-4 py-3.5 text-sm text-slate-400 whitespace-nowrap tabular-nums">${r.fecha||'—'}</td>
        <td class="px-4 py-3.5"><span class="text-sm font-600 text-slate-200">${r.nombre||'—'}</span></td>
        <td class="px-4 py-3.5"><span class="text-xs font-700 bg-brand-400/10 text-brand-300 border border-brand-400/20 px-2 py-0.5 rounded-full">T${r.turno||'—'}</span></td>
        <td class="px-4 py-3.5 text-right text-sm font-600 text-slate-200 tabular-nums">${Fmt.money(r.totalIslas)}</td>
        <td class="px-4 py-3.5 text-right text-sm text-slate-400 tabular-nums">${Fmt.money(r.totalRecaudado)}</td>
        <td class="px-4 py-3.5 text-right text-sm tabular-nums ${Fmt.diffClass(r.diferencia)}">${Fmt.diff(r.diferencia)}</td>
        <td class="px-4 py-3.5 text-center"><span class="text-[11px] font-600 px-2.5 py-1 rounded-full ${est.cls}">${est.label}</span></td>
        <td class="px-4 py-3.5">
          <button onclick="event.stopPropagation();Data.borrar('${r.id}')" class="text-slate-600 hover:text-red-400 transition-colors text-base p-1" title="Eliminar">🗑</button>
        </td>
      </tr>`;
    }).join('');
  },

  calcResumen(lista){
    let gV=0,gR=0,gD=0,gT=lista.length;
    const pNombres={};
    lista.forEach(r=>{
      const v=Number(r.totalIslas||0), rec=Number(r.totalRecaudado||0), d=Number(r.diferencia||0);
      gV+=v; gR+=rec; gD+=d;
      const n=r.nombre||'N/A';
      if(!pNombres[n]) pNombres[n]={v:0,r:0,d:0,t:0};
      pNombres[n].v+=v; pNombres[n].r+=rec; pNombres[n].d+=d; pNombres[n].t++;
    });
    const kpiData=[
      { label:'Turnos', value:gT, icon:'📋', cls:'text-slate-200' },
      { label:'Venta Total', value:Fmt.money(gV), icon:'⛽', cls:'text-brand-300' },
      { label:'Total Recaudado', value:Fmt.money(gR), icon:'💰', cls:'text-emerald-400' },
      { label:'Balance General', value:Fmt.diff(gD), icon:'📊', cls:gD<0?'text-red-400':gD>0?'text-amber-400':'text-emerald-400' }
    ];
    document.getElementById('resumen-container').innerHTML=kpiData.map(k=>`
      <div class="bg-[#0a0f1a] border border-white/8 rounded-2xl p-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[10px] font-700 text-slate-500 uppercase tracking-wider">${k.label}</span>
          <span class="text-base">${k.icon}</span>
        </div>
        <div class="text-xl font-800 ${k.cls} tabular-nums">${k.value}</div>
      </div>`).join('');
  },

  async borrar(id){
    if(!confirm('¿Eliminar este registro permanentemente?')) return;
    await db.collection("rendiciones").doc(id).delete();
    Data.cargar();
  },

  exportarCSV(){
    if(!DB.todos.length) return;
    const cols=['Fecha','Nombre','Turno','Venta','Recaudado','Diferencia','Estado'];
    const rows=DB.todos.map(r=>[
      r.fecha,r.nombre,r.turno,r.totalIslas,r.totalRecaudado,r.diferencia,
      r.diferencia<0?'Faltante':r.diferencia>0?'Sobrante':'Cuadrado'
    ].join(','));
    const csv='\uFEFF'+cols.join(',')+'\n'+rows.join('\n');
    const blob=new Blob([csv],{ type:'text/csv;charset=utf-8;' });
    const link=document.createElement('a');
    link.href=URL.createObjectURL(blob);
    link.download=`EstacionDigital_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
  }
};

/* ───────────────────────────────────
   Filters Module — sin recarga de página
─────────────────────────────────── */
const Filters = {
  aplicar(){
    const nom=document.getElementById('f-nombre').value.trim().toLowerCase();
    const mes=document.getElementById('f-mes').value;
    const año=document.getElementById('f-año').value;
    const estado=document.getElementById('f-estado').value;

    let lista=DB.todos.filter(r=>{
      // Nombre
      if(nom&&!(r.nombre||'').toLowerCase().includes(nom)) return false;
      // Fecha — parsear YYYY-MM-DD o DD/MM/YYYY
      const f=r.fecha||'';
      let rMes='',rAño='';
      if(f.includes('-')){ const p=f.split('-'); rAño=p[0]; rMes=p[1]; }
      else if(f.includes('/')){ const p=f.split('/'); rAño=p[2]; rMes=p[1]; }
      if(mes&&rMes!==mes) return false;
      if(año&&rAño!==año) return false;
      // Estado
      if(estado){
        const d=Number(r.diferencia||0);
        if(estado==='cuadrado'&&Math.abs(d)>=1) return false;
        if(estado==='faltante'&&d>=0) return false;
        if(estado==='sobrante'&&d<=0) return false;
      }
      return true;
    });

    // Ordenar
    lista.sort((a,b)=>{
      let va=a[Data.sortCol]??'', vb=b[Data.sortCol]??'';
      if(Data.sortCol==='fechaGuardado'){ va=a.fechaGuardado?.seconds||0; vb=b.fechaGuardado?.seconds||0; }
      if(typeof va==='number'&&typeof vb==='number') return Data.sortDir*(va-vb);
      return Data.sortDir*String(va).localeCompare(String(vb));
    });

    Data.render(lista);
    Data.calcResumen(lista);
  },

  limpiar(){
    document.getElementById('f-nombre').value='';
    document.getElementById('f-mes').value='';
    document.getElementById('f-año').value='';
    document.getElementById('f-estado').value='';
    this.aplicar();
  }
};
