<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estación Digital — Rendición Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        /* ===================== ESTILOS BASE ===================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0f1117; color: #f0f2f8; min-height: 100vh; }

        /* BANNER BIENVENIDA */
        .welcome-banner {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: linear-gradient(90deg, #FBCF09 0%, #DD1D21 100%);
            color: #111; padding: 12px; text-align: center;
            font-weight: 800; font-size: 14px; z-index: 10000;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* LOGIN */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px; position: fixed; inset: 0; z-index: 9999; background: #0f1117;
        }
        #login-screen.hidden { display: none; }
        .login-card {
            background: #1a1d26; border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 32px 28px; width: 100%; max-width: 380px; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .login-logo-icon {
            width: 72px; height: 72px; background: linear-gradient(135deg, #B01519, #DD1D21);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #FBCF09; font-size: 32px; margin: 0 auto 20px;
        }
        .login-title { font-size: 24px; font-weight: 800; text-align: center; }
        .login-sub { font-size: 14px; color: #5a6080; text-align: center; margin-bottom: 20px; }
        .login-input {
            background: #252836; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px;
            color: #f0f2f8; font-size: 15px; padding: 13px 15px; width: 100%; outline: none; margin-bottom: 12px;
        }
        .btn-login {
            width: 100%; background: linear-gradient(135deg, #B01519, #DD1D21);
            border: none; color: #fff; font-size: 15px; font-weight: 700; padding: 14px;
            border-radius: 12px; cursor: pointer; box-shadow: 0 4px 16px rgba(221,29,33,0.4);
        }

        /* APP INTERFACE */
        #app-screen { display: none; }
        #app-screen.visible { display: block; }
        .header { background: linear-gradient(135deg, #B01519, #DD1D21); border-bottom: 2.5px solid #FBCF09; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        
        .toolbar { padding: 16px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: #1a1d26; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .search-input { background: #252836; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 8px; color: #f0f2f8; padding: 10px 14px; outline: none; }
        
        /* RESUMEN CARDS */
        .resumen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px 24px; }
        .card-resumen { background: #1a1d26; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; border-left: 4px solid #FBCF09; }
        .card-resumen.grand-total { background: linear-gradient(135deg, #2a2d3e 0%, #1a1d26 100%); border-left: 6px solid #DD1D21; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .card-resumen h4 { color: #FBCF09; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .card-resumen.grand-total h4 { color: #fff; font-size: 16px; }
        .resumen-val { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .resumen-total-dif { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); font-weight: 700; }

        /* TABLA */
        .table-wrap { overflow-x: auto; padding: 0 24px 40px 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
        thead th { background: #1a1d26; color: #8a90a8; padding: 12px; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.06); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .pos { color: #22c55e; font-weight: 700; }
        .neg { color: #ef4444; font-weight: 700; }
        .cero { color: #FBCF09; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #modal.open { display: flex; }
        .mbox { background: #1a1d26; border-radius: 18px; width: 100%; max-width: 500px; padding: 24px; }
    </style>
</head>
<body>

<div id="welcome-banner" class="welcome-banner"><span id="welcome-text"></span></div>

<div id="login-screen">
    <div class="login-card">
        <div class="login-logo-icon">⚡</div>
        <div class="login-title">Estación Digital</div>
        <div class="login-sub">Rendición Pro</div>
        <input type="email" class="login-input" id="login-email" placeholder="Correo electrónico" />
        <input type="password" class="login-input" id="login-password" placeholder="Contraseña" onkeydown="if(event.key==='Enter')iniciarSesion()" />
        <button class="btn-login" onclick="iniciarSesion()">Ingresar al Sistema</button>
        <p id="login-error" style="color:#ef4444; font-size:12px; margin-top:10px; text-align:center; display:none;"></p>
    </div>
</div>

<div id="app-screen">
    <div class="header">
        <div>
            <div class="header-title">Estación Digital</div>
            <div class="header-sub">Panel de Auditoría Financiera</div>
        </div>
        <button onclick="cerrarSesion()" style="background:none; border:1px solid #fff; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px;">Cerrar Sesión</button>
    </div>

    <div class="toolbar">
        <input type="text" class="search-input" id="f-nombre" placeholder="Nombre empleado..." oninput="filtrar()" style="width: 180px;" />
        <select class="search-input" id="f-mes" onchange="filtrar()">
            <option value="">Todos los meses</option>
            <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
            <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
            <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <select class="search-input" id="f-año" onchange="filtrar()">
            <option value="">Todos los años</option>
            <option value="2025">2025</option><option value="2026">2026</option>
        </select>
        <button class="search-input" style="cursor:pointer; background:#252836;" onclick="cargarDatos()">🔄</button>
        <button class="search-input" style="cursor:pointer; background:#22c55e; color:#fff; border:none;" onclick="exportarCSV()">📥 Exportar CSV</button>
    </div>

    <div id="resumen-container" class="resumen-grid"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th><th>Empleado</th><th>Turno</th><th>Venta Total</th><th>Recaudado</th><th>Diferencia</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<div id="modal" onclick="if(event.target===this)cerrarModal()">
    <div class="mbox" id="mcontent"></div>
</div>

<script>
// CONFIGURACIÓN FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyDt0K2X84fWd7QcN1ggxRapw1rnqSDj8n8",
    authDomain: "shell-rendicion.firebaseapp.com",
    projectId: "shell-rendicion",
    storageBucket: "shell-rendicion.firebasestorage.app",
    messagingSenderId: "210880588861",
    appId: "1:210880588861:web:60d3248e25e2853ba88e54"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
let todos = [];

// FORMATOS
const fmt = (n) => '$' + Math.floor(Number(n||0)).toLocaleString('es-CL');
const fmtD = (n) => {
    let v = Math.floor(Number(n||0));
    return (v > 0 ? '+' : '') + v.toLocaleString('es-CL');
};
const dc = (n) => n < 0 ? 'neg' : n > 0 ? 'pos' : 'cero';

// AUTH
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.add('visible');
        mostrarBienvenida(user.email);
        cargarDatos();
    } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.remove('visible');
    }
});

function mostrarBienvenida(email) {
    const nom = email.split('@')[0].toUpperCase();
    const banner = document.getElementById('welcome-banner');
    document.getElementById('welcome-text').textContent = `👋 ¡Hola, ${nom}! Bienvenido a Estación Digital.`;
    banner.style.display = 'block';
    setTimeout(() => { banner.style.opacity = '0'; setTimeout(() => banner.style.display = 'none', 800); }, 4000);
}

async function iniciarSesion() {
    const e = document.getElementById('login-email').value;
    const p = document.getElementById('login-password').value;
    try { await auth.signInWithEmailAndPassword(e, p); } 
    catch (err) { document.getElementById('login-error').style.display='block'; document.getElementById('login-error').textContent="Error de acceso."; }
}
function cerrarSesion() { auth.signOut(); }

// LOGICA DE DATOS
function cargarDatos() {
    db.collection("rendiciones").orderBy("fechaGuardado", "desc").get().then(snap => {
        todos = [];
        snap.forEach(doc => todos.push({id: doc.id, ...doc.data()}));
        filtrar();
    });
}

function filtrar() {
    const nom = document.getElementById('f-nombre').value.toLowerCase();
    const mes = document.getElementById('f-mes').value;
    const año = document.getElementById('f-año').value;

    let filtrados = todos.filter(r => {
        const f = r.fecha || '';
        const partes = f.includes('-') ? f.split('-') : f.split('/');
        const rMes = f.includes('-') ? partes[1] : partes[1];
        const rAño = f.includes('-') ? partes[0] : partes[2];
        return (r.nombre || '').toLowerCase().includes(nom) && (mes==="" || rMes===mes) && (año==="" || rAño===año);
    });

    // Ordenar por descuadre absoluto
    filtrados.sort((a,b) => Math.abs(Number(b.diferencia||0)) - Math.abs(Number(a.diferencia||0)));

    renderTabla(filtrados);
    calcularResumen(filtrados);
}

function renderTabla(lista) {
    document.getElementById('tbody').innerHTML = lista.map(r => `
        <tr>
            <td>${r.fecha}</td>
            <td style="font-weight:700">${r.nombre}</td>
            <td>T${r.turno}</td>
            <td>${fmt(r.totalIslas)}</td>
            <td>${fmt(r.totalRecaudado)}</td>
            <td class="${dc(r.diferencia)}">${fmtD(r.diferencia)}</td>
            <td>
                <button onclick="verDetalle('${r.id}')" style="cursor:pointer; background:none; border:none">👁️</button>
            </td>
        </tr>
    `).join('');
}

function calcularResumen(lista) {
    const res = {};
    let gV = 0, gR = 0, gD = 0, gT = 0;

    lista.forEach(r => {
        const n = r.nombre || 'N/A';
        const v = Number(r.totalIslas||0), rec = Number(r.totalRecaudado||0), d = Number(r.diferencia||0);
        if(!res[n]) res[n] = {v:0, r:0, d:0, t:0};
        res[n].v+=v; res[n].r+=rec; res[n].d+=d; res[n].t++;
        gV+=v; gR+=rec; gD+=d; gT++;
    });

    let html = gT > 0 ? `
        <div class="card-resumen grand-total">
            <h4>📊 TOTAL GENERAL</h4>
            <div class="resumen-val"><span>Turnos:</span> <span>${gT}</span></div>
            <div class="resumen-val"><span>Venta:</span> <span>${fmt(gV)}</span></div>
            <div class="resumen-val resumen-total-dif"><span>Balance Estación:</span> <span class="${dc(gD)}">${fmtD(gD)}</span></div>
        </div>
    ` : '';

    html += Object.keys(res).map(n => `
        <div class="card-resumen">
            <h4>👤 ${n}</h4>
            <div class="resumen-val"><span>Turnos:</span> <span>${res[n].t}</span></div>
            <div class="resumen-val"><span>Venta:</span> <span>${fmt(res[n].v)}</span></div>
            <div class="resumen-val resumen-total-dif"><span>Balance:</span> <span class="${dc(res[n].d)}">${fmtD(res[n].d)}</span></div>
        </div>
    `).join('');

    document.getElementById('resumen-container').innerHTML = html;
}

function verDetalle(id) {
    const r = todos.find(x => x.id === id);
    document.getElementById('mcontent').innerHTML = `
        <h3 style="margin-bottom:15px">Detalle de Turno</h3>
        <p><b>Empleado:</b> ${r.nombre}</p>
        <p><b>Fecha:</b> ${r.fecha} (Turno ${r.turno})</p>
        <hr style="margin:15px 0; border:0; border-top:1px solid #333">
        <p>Venta: ${fmt(r.totalIslas)}</p>
        <p>Recaudado: ${fmt(r.totalRecaudado)}</p>
        <p>Diferencia: <b class="${dc(r.diferencia)}">${fmtD(r.diferencia)}</b></p>
        <p style="margin-top:10px"><b>Notas:</b> ${r.observaciones || 'Sin notas'}</p>
        <button onclick="cerrarModal()" style="width:100%; margin-top:20px; padding:12px; background:#DD1D21; color:#fff; border:none; border-radius:8px; cursor:pointer;">Cerrar Ventana</button>
    `;
    document.getElementById('modal').classList.add('open');
}
function cerrarModal() { document.getElementById('modal').classList.remove('open'); }

function exportarCSV() {
    if(!todos.length) return;
    const rows = [["Fecha","Nombre","Turno","Venta","Recaudado","Diferencia"]];
    todos.forEach(r => rows.push([r.fecha, r.nombre, r.turno, r.totalIslas, r.totalRecaudado, r.diferencia]));
    const csv = "\uFEFF" + rows.map(e => e.join(",")).join("\n");
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Rendicion_Pro_Reporte.csv";
    link.click();
}
</script>
</body>
</html>
