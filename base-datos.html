<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estación Digital — Rendición Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      /* Azul metálico — paleta principal */
      --blue: #2b6cb0;
      --blue-mid: #1e4e8c;
      --blue-dark: #152e54;
      --blue-glow: rgba(43, 108, 176, 0.22);
      --blue-light: #4299e1;
      --cyan: #38bdf8;
      --cyan-dim: rgba(56, 189, 248, 0.14);
      --cyan-mid: rgba(56, 189, 248, 0.28);
      --steel: #63788a;
      --steel-light: #9db4c8;

      /* Fondo y superficies */
      --bg: #080d14;
      --surface: #0f1a27;
      --surface2: #152233;
      --surface3: #1b2d40;
      --border: rgba(56, 189, 248, 0.10);
      --border2: rgba(56, 189, 248, 0.18);

      /* Texto */
      --text: #e8f0f8;
      --text-2: #7a9ab5;
      --text-3: #3d5a72;

      /* Estados */
      --green: #22d472;
      --green-dim: rgba(34, 212, 114, 0.12);
      --alert: #f23838;
      --alert-dim: rgba(242, 56, 56, 0.12);

      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── BANNER ── */
    .welcome-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, var(--blue-dark), var(--blue));
      border-bottom: 1px solid var(--cyan);
      color: #fff;
      padding: 12px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      z-index: 10000;
      display: none;
      box-shadow: 0 4px 20px var(--blue-glow);
      animation: slideDown .5s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
      }

      to {
        transform: translateY(0);
      }
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      /* sutil textura de cuadrícula */
      background-image:
        linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #login-screen.hidden {
      display: none;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 40px var(--blue-glow);
      position: relative;
      overflow: hidden;
    }

    /* línea de brillo superior */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .login-logo-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
      position: relative;
    }

    .login-logo-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: conic-gradient(var(--cyan), var(--blue), var(--cyan));
      opacity: .25;
      filter: blur(8px);
      z-index: 0;
    }

    .login-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
      position: relative;
      z-index: 1;
    }

    .login-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      letter-spacing: -.4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--steel);
      text-align: center;
      margin-bottom: 24px;
      margin-top: 4px;
    }

    .admin-badge {
      display: block;
      width: fit-content;
      margin: 0 auto 22px;
      background: var(--cyan-dim);
      border: 1px solid var(--border2);
      color: var(--cyan);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      padding: 4px 14px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .login-input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px 14px;
      width: 100%;
      outline: none;
      margin-bottom: 10px;
      transition: border-color .2s, box-shadow .2s;
    }

    .login-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--blue-mid), var(--blue));
      border: none;
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      border-radius: 11px;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 4px 20px var(--blue-glow);
      transition: opacity .18s, transform .1s;
      letter-spacing: -.1px;
    }

    .btn-login:active {
      opacity: .85;
      transform: scale(.98);
    }

    /* ── APP SCREEN ── */
    #app-screen {
      display: none;
    }

    #app-screen.visible {
      display: block;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 20px rgba(0, 0, 0, .5);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      overflow: hidden;
    }

    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px;
    }

    .btn-logout {
      background: var(--surface3);
      border: 1px solid var(--border2);
      color: var(--text-2);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-logout:hover {
      background: var(--blue-glow);
      color: var(--cyan);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 14px 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      padding: 9px 13px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .search-input:focus {
      border-color: var(--cyan);
    }

    .btn-toolbar {
      background: var(--surface2);
      border: 1.5px solid var(--border2);
      color: var(--text-2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-toolbar:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .btn-toolbar.green {
      background: var(--green-dim);
      border-color: rgba(34, 212, 114, .3);
      color: var(--green);
    }

    /* ── RESUMEN CARDS ── */
    .resumen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      padding: 20px 28px;
    }

    .card-resumen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--cyan);
      border-radius: 12px;
      padding: 16px;
      transition: box-shadow .2s;
    }

    .card-resumen:hover {
      box-shadow: 0 0 16px var(--blue-glow);
    }

    .card-resumen.grand-total {
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      border-left: 4px solid var(--blue-light);
      box-shadow: 0 4px 24px var(--blue-glow);
    }

    .card-resumen h4 {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    .card-resumen.grand-total h4 {
      color: var(--text);
      font-size: 14px;
    }

    .resumen-val {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--text-2);
    }

    .resumen-val span:last-child {
      color: var(--text);
      font-family: var(--mono);
    }

    .resumen-val span.pos,
    .resumen-val span.neg,
    .resumen-val span.cero {
      font-family: var(--mono);
      font-weight: 700;
    }

    .resumen-val span.pos {
      color: var(--green) !important;
    }

    .resumen-val span.neg {
      color: var(--alert) !important;
    }

    .resumen-val span.cero {
      color: #ffffff !important;
    }

    .resumen-total-dif {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
    }

    /* ── TABLA ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 28px 48px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 900px;
    }

    thead th {
      background: var(--surface2);
      color: var(--steel);
      padding: 11px 13px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border2);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    td {
      padding: 12px 13px;
    }

    .pos {
      color: var(--green);
      font-weight: 700;
      font-family: var(--mono);
    }

    .neg {
      color: var(--alert);
      font-weight: 700;
      font-family: var(--mono);
    }

    .cero {
      color: #ffffff;
      font-weight: 700;
      font-family: var(--mono);
    }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #modal.open {
      display: flex;
    }

    .mbox {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 18px;
      width: 100%;
      max-width: 500px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .6), 0 0 30px var(--blue-glow);
    }

    /* ── SPINNER ── */
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDt0K2X84fWd7QcN1ggxRapw1rnqSDj8n8",
      authDomain: "shell-rendicion.firebaseapp.com",
      projectId: "shell-rendicion",
      storageBucket: "shell-rendicion.firebasestorage.app",
      messagingSenderId: "210880588861",
      appId: "1:210880588861:web:60d3248e25e2853ba88e54"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let todos = [];

    const fmt = n => '$' + Math.floor(Number(n || 0)).toLocaleString('es-CL');
    const fmtD = n => { let v = Math.floor(Number(n || 0)); return (v > 0 ? '+' : '') + v.toLocaleString('es-CL'); };
    const dc = n => n < 0 ? 'neg' : n > 0 ? 'pos' : 'cero';

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.add('visible');
        document.getElementById('user-display').textContent = user.email.split('@')[0].toUpperCase();
        mostrarBienvenida(user.email);
        cargarDatos();
      } else {
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.remove('visible');
      }
    });

    function mostrarBienvenida(email) {
      const nom = email.split('@')[0].toUpperCase();
      const banner = document.getElementById('welcome-banner');
      document.getElementById('welcome-text').textContent = '👋 ¡Hola, ' + nom + '! Bienvenido a Estación Digital.';
      banner.style.display = 'block'; banner.style.opacity = '1';
      setTimeout(() => {
        banner.style.transition = 'opacity .8s'; banner.style.opacity = '0';
        setTimeout(() => banner.style.display = 'none', 800);
      }, 4000);
    }

    async function iniciarSesion() {
      const e = document.getElementById('login-email').value;
      const p = document.getElementById('login-password').value;
      try { await auth.signInWithEmailAndPassword(e, p); }
      catch (err) {
        const el = document.getElementById('login-error');
        el.style.display = 'block';
        el.textContent = 'Credenciales incorrectas. Intenta de nuevo.';
      }
    }
    function cerrarSesion() { auth.signOut(); }

    function cargarDatos() {
      document.getElementById('carga').style.display = 'flex';
      db.collection("rendiciones").orderBy("fechaGuardado", "desc").get().then(snap => {
        todos = [];
        snap.forEach(doc => todos.push({ id: doc.id, ...doc.data() }));
        filtrar();
        document.getElementById('carga').style.display = 'none';
      });
    }

    function filtrar() {
      const nom = document.getElementById('f-nombre').value.toLowerCase();
      const mes = document.getElementById('f-mes').value;
      const año = document.getElementById('f-año').value;
      let filtrados = todos.filter(r => {
        const f = r.fecha || '';
        const p = f.includes('-') ? f.split('-') : f.split('/');
        const rMes = f.includes('-') ? p[1] : p[1];
        const rAño = f.includes('-') ? p[0] : p[2];
        return (r.nombre || '').toLowerCase().includes(nom) && (mes === '' || rMes === mes) && (año === '' || rAño === año);
      });
      filtrados.sort((a, b) => Math.abs(Number(b.diferencia || 0)) - Math.abs(Number(a.diferencia || 0)));
      document.getElementById('total-reg').textContent = filtrados.length + ' registros';
      renderTabla(filtrados);
      calcularResumen(filtrados);
    }

    function renderTabla(lista) {
      document.getElementById('tbody').innerHTML = lista.map(r => `
      <tr>
        <td>${r.fecha || '-'}</td>
        <td style="font-weight:700">${r.nombre || '-'}</td>
        <td>T${r.turno || '-'}</td>
        <td style="font-family:var(--mono)">${fmt(r.totalIslas)}</td>
        <td style="font-family:var(--mono)">${fmt(r.totalRecaudado)}</td>
        <td class="${dc(r.diferencia)}">${fmtD(r.diferencia)}</td>
        <td>
          <button onclick="verDetalle('${r.id}')"
            style="cursor:pointer;background:none;border:none;font-size:16px;" title="Ver detalle">👁️</button>
          <button onclick="borrar('${r.id}')"
            style="cursor:pointer;background:none;border:none;font-size:16px;margin-left:8px;" title="Eliminar">🗑️</button>
        </td>
      </tr>`).join('');
    }

    function calcularResumen(lista) {
      const res = {}; let gV = 0, gR = 0, gD = 0, gT = 0;
      lista.forEach(r => {
        const n = (r.nombre || 'N/A').trim().toLowerCase(), v = Number(r.totalIslas || 0), rec = Number(r.totalRecaudado || 0), d = Number(r.diferencia || 0);
        if (!res[n]) res[n] = { v: 0, r: 0, d: 0, t: 0 };
        res[n].v += v; res[n].r += rec; res[n].d += d; res[n].t++;
        gV += v; gR += rec; gD += d; gT++;
      });
      let html = gT > 0 ? `
      <div class="card-resumen grand-total">
        <h4>📊 Total General</h4>
        <div class="resumen-val"><span>Turnos:</span><span>${gT}</span></div>
        <div class="resumen-val"><span>Venta Total:</span><span>${fmt(gV)}</span></div>
        <div class="resumen-val resumen-total-dif"><span>Balance Estación:</span><span class="${dc(gD)}">${fmtD(gD)}</span></div>
      </div>` : '';
      html += Object.keys(res).map(n => `
      <div class="card-resumen">
        <h4>👤 ${n.charAt(0).toUpperCase() + n.slice(1)}</h4>
        <div class="resumen-val"><span>Turnos:</span><span>${res[n].t}</span></div>
        <div class="resumen-val"><span>Venta:</span><span>${fmt(res[n].v)}</span></div>
        <div class="resumen-val resumen-total-dif"><span>Balance:</span><span class="${dc(res[n].d)}">${fmtD(res[n].d)}</span></div>
      </div>`).join('');
      document.getElementById('resumen-container').innerHTML = html;
    }

    function verDetalle(id) {
      const r = todos.find(x => x.id === id);
      if (!r) return;
      document.getElementById('mcontent').innerHTML = `
      <h3 style="margin-bottom:16px;font-size:17px;color:var(--text);">Detalle de Turno</h3>
      <p style="color:var(--text-2);margin-bottom:6px;"><b style="color:var(--text)">Empleado:</b> ${r.nombre || '-'}</p>
      <p style="color:var(--text-2);margin-bottom:14px;"><b style="color:var(--text)">Fecha:</b> ${r.fecha || '-'} · Turno ${r.turno || '-'}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        <div style="background:var(--surface2);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Venta Total</div>
          <div style="font-size:18px;font-weight:800;font-family:var(--mono);color:var(--text);">${fmt(r.totalIslas)}</div>
        </div>
        <div style="background:var(--surface2);padding:14px;border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Diferencia</div>
          <div style="font-size:18px;font-weight:800;font-family:var(--mono);" class="${dc(r.diferencia)}">${fmtD(r.diferencia)}</div>
        </div>
      </div>
      <p style="color:var(--text-2);font-size:13px;"><b style="color:var(--text)">Observaciones:</b> ${r.observaciones || 'Sin notas'}</p>
      <button onclick="cerrarModal()" style="width:100%;margin-top:20px;padding:12px;
        background:linear-gradient(135deg,var(--blue-mid),var(--blue));color:#fff;
        border:none;border-radius:10px;cursor:pointer;font-family:var(--font);font-weight:700;font-size:14px;">
        Cerrar
      </button>`;
      document.getElementById('modal').classList.add('open');
    }

    function borrar(id) {
      if (!confirm('¿Eliminar este registro permanentemente?')) return;
      db.collection("rendiciones").doc(id).delete().then(() => cargarDatos());
    }

    function cerrarModal() { document.getElementById('modal').classList.remove('open'); }

    function exportarCSV() {
      if (!todos.length) return;
      const rows = [['Fecha', 'Nombre', 'Turno', 'Venta', 'Recaudado', 'Diferencia']];
      todos.forEach(r => rows.push([r.fecha, r.nombre, r.turno, r.totalIslas, r.totalRecaudado, r.diferencia]));
      const csv = '\uFEFF' + rows.map(e => e.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob); link.download = 'EstacionDigital_Reporte.csv'; link.click();
    }
  </script>
</body>

</html>
