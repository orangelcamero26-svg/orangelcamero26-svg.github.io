<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Estación Digital — Panel de Auditoría</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
            alert: '#ef4444',
            success: '#10b981',
            warning: '#f59e0b',
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'float': '0 10px 40px -10px rgba(0, 0, 0, 0.08)',
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    body { background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; } 
    ::-webkit-scrollbar-track { background: transparent; } 
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    .input-field {
      @apply w-full bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm outline-none transition-all duration-200 shadow-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100;
    }
    
    .data-row:hover { background: #f1f5f9; }
    
    /* Animation */
    .modal-overlay { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .panel-enter { animation: panelIn .25s ease-out; }
    @keyframes panelIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    
    th.sortable:hover { color: #0ea5e9; cursor: pointer; }
    th.sort-asc::after { content: ' ↑'; color: #0ea5e9; }
    th.sort-desc::after { content: ' ↓'; color: #0ea5e9; }
    
    .spinner { border: 2px solid #e2e8f0; border-top-color: #0ea5e9; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</head>
<body class="font-sans min-h-screen">

<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="fixed inset-0 flex items-center justify-center z-50 px-5" style="background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);">
  <div class="absolute top-0 right-0 w-72 h-72 rounded-full opacity-20 pointer-events-none" style="background:radial-gradient(circle, #0ea5e9, transparent);transform:translate(30%,-30%)"></div>
  <div class="absolute bottom-0 left-0 w-64 h-64 rounded-full opacity-15 pointer-events-none" style="background:radial-gradient(circle, #0284c7, transparent);transform:translate(-30%,30%)"></div>
  <div class="relative w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-24 h-24 rounded-3xl overflow-hidden border-2 border-white shadow-[0_8px_32px_rgba(2,132,199,0.25)] mb-4" style="background:white;">
        <img src="logo-nuevo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.style.display='none'"/>
      </div>
      <h1 class="text-2xl font-black text-slate-800 tracking-tight mb-1">Estación Digital</h1>
      <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Panel de Auditoría</p>
    </div>
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-7 shadow-[0_20px_60px_rgba(0,0,0,0.1)] border border-white">
      <div class="flex items-center justify-center gap-2 bg-brand-50 border border-brand-100 rounded-2xl px-4 py-2.5 mb-6">
        <span class="text-base">🔒</span>
        <span class="text-xs font-black text-brand-700 uppercase tracking-widest">Acceso Administrador</span>
      </div>
      <div class="space-y-3 mb-5">
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">✉️</span>
          <input type="email" id="login-email" placeholder="Correo electrónico"
            class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl pl-11 pr-4 py-3.5 text-sm font-semibold text-slate-800 outline-none transition-all duration-200 focus:border-brand-400 focus:bg-white focus:ring-4 focus:ring-brand-50 placeholder:text-slate-300 placeholder:font-normal"/>
        </div>
        <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔑</span>
          <input type="password" id="login-password" placeholder="Contraseña"
            class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl pl-11 pr-4 py-3.5 text-sm font-semibold text-slate-800 outline-none transition-all duration-200 focus:border-brand-400 focus:bg-white focus:ring-4 focus:ring-brand-50 placeholder:text-slate-300 placeholder:font-normal"
            onkeydown="if(event.key==='Enter')Auth.login()"/>
        </div>
      </div>
      <button onclick="Auth.login()"
        class="w-full bg-brand-600 hover:bg-brand-700 active:scale-95 text-white font-black text-sm py-4 rounded-2xl shadow-[0_8px_20px_-4px_rgba(2,132,199,0.5)] transition-all duration-200 tracking-wide">
        Ingresar al Sistema →
      </button>
      <p id="login-error" class="hidden text-red-500 text-xs text-center mt-4 font-bold bg-red-50 border border-red-100 rounded-xl py-2 px-3"></p>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app-screen" class="hidden min-h-screen flex flex-col">

  <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 px-6 py-3.5 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 overflow-hidden rounded-lg bg-white border border-slate-100 shadow-sm flex-shrink-0">
        <img src="logo-nuevo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.src='logo-nuevo.png'"/>
      </div>
      <div>
        <div class="text-sm font-bold text-slate-800 leading-tight">Estación Digital</div>
        <div class="text-[11px] font-medium text-slate-500">Panel de Auditoría</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full px-3 py-1.5 shadow-sm">
        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        <span id="user-display" class="text-[11px] font-bold text-slate-600"></span>
      </div>
      <a href="index.html" class="flex items-center gap-1.5 text-xs text-brand-600 font-bold border border-brand-200 bg-brand-50 rounded-lg px-3 py-2 hover:bg-brand-100 active:scale-95 transition-all">← App</a>
      <button onclick="Auth.logout()" class="text-xs text-slate-500 font-bold border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-50 active:scale-95 transition-all">Salir</button>
    </div>
  </header>

  <div id="welcome-banner" class="hidden bg-gradient-to-r from-brand-600 to-brand-500 text-sm font-semibold text-white text-center py-2.5 px-4 shadow-sm">
    <span id="welcome-text"></span>
  </div>

  <!-- TOOLBAR Y FILTROS -->
  <div class="bg-white border-b border-slate-200 px-4 py-4 z-30">

    <!-- Fila 1: Buscador -->
    <div class="relative mb-3">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
      <input type="text" id="f-nombre" placeholder="Buscar empleado..." oninput="Filters.aplicar()"
        class="input-field pl-10 py-3 rounded-2xl border-2 border-slate-100 focus:border-brand-400 bg-slate-50 focus:bg-white w-full"/>
    </div>

    <!-- Fila 2: Botones de acción -->
    <div class="grid grid-cols-3 gap-2 mb-1">
      <button onclick="Data.cargar()"
        class="flex flex-col items-center justify-center gap-1 bg-slate-50 border border-slate-200 text-slate-600 font-bold text-xs py-3 rounded-2xl shadow-sm hover:bg-slate-100 active:scale-95 transition-all">
        <span id="reload-icon" class="text-lg leading-none">🔄</span>
        <span>Cargar</span>
      </button>
      <button onclick="Data.exportarExcel()"
        class="flex flex-col items-center justify-center gap-1 bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold text-xs py-3 rounded-2xl shadow-sm hover:bg-emerald-100 active:scale-95 transition-all">
        <span class="text-lg leading-none">📊</span>
        <span>Excel</span>
      </button>
      <button onclick="Data.exportarPDF()"
        class="flex flex-col items-center justify-center gap-1 bg-red-50 border border-red-200 text-red-600 font-bold text-xs py-3 rounded-2xl shadow-sm hover:bg-red-100 active:scale-95 transition-all">
        <span class="text-lg leading-none">📄</span>
        <span>PDF</span>
      </button>
    </div>
    
    <div class="bg-slate-50/50 border border-slate-100 rounded-xl p-4 mb-2">
      <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-3">
        <div class="flex items-center gap-3">
          <span class="text-[11px] font-black text-slate-700 uppercase tracking-widest">⚙️ Filtros</span>
          <button onclick="Filters.limpiar()" class="text-[10px] font-bold text-brand-600 hover:text-brand-700 bg-brand-50 hover:bg-brand-100 px-2.5 py-1 rounded-md transition-colors border border-brand-100 active:scale-95">Resetear</button>
        </div>
        <span id="total-reg" class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest bg-white px-3 py-1 rounded-lg border border-slate-200 shadow-sm"></span>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <select id="f-turno" onchange="Filters.aplicar()" class="w-full bg-white border border-slate-200 rounded-xl text-slate-600 text-xs font-bold px-3 py-2.5 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 shadow-sm transition-all appearance-none cursor-pointer">
          <option value="">📍 Todos los turnos</option>
          <option value="1">T1</option>
          <option value="2">T2</option>
          <option value="3">T3</option>
          <option value="1M">T1M</option>
          <option value="2M">T2M</option>
          <option value="2A">T2A</option>
          <option value="2AM">T2AM</option>
          <option value="3E">T3E</option>
          <option value="3A">T3A</option>
          <option value="3M">T3M</option>
          <option value="3AM">T3AM</option>
        </select>

        <select id="f-mes" onchange="Filters.aplicar()" class="w-full bg-white border border-slate-200 rounded-xl text-slate-600 text-xs font-bold px-3 py-2.5 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 shadow-sm transition-all appearance-none cursor-pointer">
          <option value="">📅 Todos los meses</option>
          <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
          <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
          <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
          <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>

        <select id="f-año" onchange="Filters.aplicar()" class="w-full bg-white border border-slate-200 rounded-xl text-slate-600 text-xs font-bold px-3 py-2.5 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 shadow-sm transition-all appearance-none cursor-pointer">
          <option value="">📆 Todos los años</option>
          <option value="2025">2025</option><option value="2026">2026</option>
        </select>

        <select id="f-estado" onchange="Filters.aplicar()" class="w-full bg-white border border-slate-200 rounded-xl text-slate-600 text-xs font-bold px-3 py-2.5 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100 shadow-sm transition-all appearance-none cursor-pointer">
          <option value="">✨ Cualquier estado</option>
          <option value="cuadrado">✅ Cuadrado</option>
          <option value="faltante">⚠️ Faltante</option>
          <option value="sobrante">💰 Sobrante</option>
        </select>
      </div>
    </div>
  </div>

  <!-- KPI RESUMEN -->
  <div id="resumen-container" class="px-6 py-4 grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

  <!-- LOADING -->
  <div id="loading" class="hidden flex-col items-center py-16 gap-3">
    <div class="spinner w-8 h-8"></div>
    <p class="text-sm font-semibold text-slate-500">Cargando base de datos...</p>
  </div>

  <!-- EMPTY -->
  <div id="empty-state" class="hidden flex-col items-center py-20 gap-3">
    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-3xl">🗂️</div>
    <p class="text-sm font-bold text-slate-700">Sin Resultados</p>
    <p class="text-xs font-medium text-slate-500">Ajusta los filtros o asegura que haya datos en Firebase.</p>
  </div>

  <!-- TABLE -->
  <div class="flex-1 overflow-auto px-6 pb-8" id="table-wrap">
    <div class="min-w-[900px] bg-white rounded-2xl border border-slate-200 shadow-soft overflow-hidden">
      <table class="w-full text-sm border-collapse" id="main-table">
        <thead class="bg-slate-50 border-b border-slate-200">
          <tr>
            <th class="sortable text-left px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest whitespace-nowrap" data-col="fecha" onclick="Data.sortBy('fecha')">Fecha</th>
            <th class="sortable text-left px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest" data-col="nombre" onclick="Data.sortBy('nombre')">Empleado</th>
            <th class="text-center px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Turno</th>
            <th class="sortable text-right px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest" data-col="totalIslas" onclick="Data.sortBy('totalIslas')">Venta Islas</th>
            <th class="text-right px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Recaudado</th>
            <th class="sortable text-right px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest" data-col="diferencia" onclick="Data.sortBy('diferencia')">Diferencia</th>
            <th class="text-center px-5 py-3.5 text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Estado</th>
            <th class="px-5 py-3.5"></th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div id="modal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
  <div class="modal-overlay absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="Modal.cerrar()"></div>
  <div class="relative bg-white border border-slate-200 rounded-3xl w-full max-w-lg shadow-float panel-enter max-h-[90vh] overflow-y-auto" id="modal-content"></div>
</div>

<script>
/* FIRBASE CONFIG Y AUTH SAME AS BEFORE */
firebase.initializeApp({
  apiKey:"AIzaSyDt0K2X84fWd7QcN1ggxRapw1rnqSDj8n8", // Mismo de app original pero en entorno de produccion validando tokens
  authDomain:"shell-rendicion.firebaseapp.com",
  projectId:"shell-rendicion",
  storageBucket:"shell-rendicion.firebasestorage.app",
  messagingSenderId:"210880588861",
  appId:"1:210880588861:web:60d3248e25e2853ba88e54"
});
const db = firebase.firestore();
const auth = firebase.auth();

/* Formatters */
const Fmt = {
  money(n){ return '$'+Math.floor(Number(n||0)).toLocaleString('es-CL'); },
  diff(n){
    const v=Math.floor(Number(n||0));
    return (v>0?'+':'')+v.toLocaleString('es-CL');
  },
  diffClass(n){ return n<0?'text-alert':n>0?'text-warning':'text-success'; },
  estado(n){
    if(n<0) return { label:'Faltante', cls:'bg-red-50 text-red-600 border border-red-200' };
    if(n>0) return { label:'Sobrante', cls:'bg-amber-50 text-amber-600 border border-amber-200' };
    return { label:'OK', cls:'bg-emerald-50 text-emerald-600 border border-emerald-200' };
  }
};

/* Auth */
const Auth = {
  async login(){
    const email=document.getElementById('login-email').value;
    const pass=document.getElementById('login-password').value;
    const err=document.getElementById('login-error');
    err.classList.add('hidden');
    try { await auth.signInWithEmailAndPassword(email,pass); }
    catch(e){ err.textContent='Credenciales incorrectas o usuario no encontrado.'; err.classList.remove('hidden'); }
  },
  logout(){ auth.signOut(); }
};

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('user-display').textContent=user.email.split('@')[0].toUpperCase();
    
    Data.cargar();
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }
});

/* Schema/Storage In-Memory */
const DB = {
  todos: [],
  ingest(docs){
    this.todos=[];
    docs.forEach(d=>{
      const r={ id:d.id, ...d.data() };
      this.todos.push(r);
    });
  }
};

/* Table/Data Module */
const Data = {
  sortCol:'fechaGuardado',
  sortDir:-1,

  async cargar(){
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('loading').classList.add('flex');
    document.getElementById('table-wrap').classList.add('hidden');
    try {
      // Usar get sin await para permitir cargar si de base datos el token es de admin.
      const snap=await db.collection("rendiciones").orderBy("fechaGuardado","desc").get();
      DB.ingest(snap.docs);
      Filters.aplicar();
    } catch(e){ console.error(e); }
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('loading').classList.remove('flex');
    document.getElementById('table-wrap').classList.remove('hidden');
  },

  sortBy(col){
    if(this.sortCol===col){ this.sortDir*=-1; } else { this.sortCol=col; this.sortDir=-1; }
    document.querySelectorAll('th.sortable').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
    const th=document.querySelector(`th[data-col="${col}"]`);
    if(th) th.classList.add(this.sortDir===1?'sort-asc':'sort-desc');
    Filters.aplicar();
  },

  render(lista){
    const tbody=document.getElementById('tbody');
    const empty=document.getElementById('empty-state');
    document.getElementById('total-reg').textContent=`${lista.length} Registros`;

    if(lista.length===0){
      tbody.innerHTML='';
      empty.classList.remove('hidden'); empty.classList.add('flex');
      return;
    }
    empty.classList.add('hidden'); empty.classList.remove('flex');

    tbody.innerHTML=lista.map(r=>{
      const est=Fmt.estado(r.diferencia);
      return `<tr class="data-row cursor-pointer transition-colors" onclick="Modal.abrir('${r.id}')">
        <td class="px-5 py-3 text-sm font-semibold text-slate-500 tabular-nums">${r.fecha||'—'}</td>
        <td class="px-5 py-3"><span class="text-sm font-bold text-slate-800">${r.nombre||'—'}</span></td>
        <td class="px-5 py-3 text-center"><span class="text-xs font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded-md">T${r.turno||'—'}</span></td>
        <td class="px-5 py-3 text-right text-sm font-bold font-mono text-slate-800 tabular-nums">${Fmt.money(r.totalIslas)}</td>
        <td class="px-5 py-3 text-right text-sm font-semibold font-mono text-slate-500 tabular-nums">${Fmt.money(r.totalRecaudado)}</td>
        <td class="px-5 py-3 text-right text-sm font-bold font-mono tabular-nums ${Fmt.diffClass(r.diferencia)}">${Fmt.diff(r.diferencia)}</td>
        <td class="px-5 py-3 text-center"><span class="text-[10px] font-extrabold px-3 py-1 uppercase tracking-wide rounded-full shadow-sm ${est.cls}">${est.label}</span></td>
        <td class="px-5 py-3 text-right">
          <button onclick="event.stopPropagation();Data.borrar('${r.id}')" class="w-8 h-8 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center transition-all bg-white border border-slate-100 shadow-sm text-base">🗑</button>
        </td>
      </tr>`;
    }).join('');
  },

  calcResumen(lista){
    let gV=0,gR=0,gD=0,gT=lista.length;
    lista.forEach(r=>{
      gV+=Number(r.totalIslas||0); gR+=Number(r.totalRecaudado||0); gD+=Number(r.diferencia||0);
    });
    const kpiData=[
      { label:'Turnos', value:gT, icon:'👤', cls:'text-slate-800 border-l-4 border-slate-300' },
      { label:'Venta Total', value:Fmt.money(gV), icon:'⛽', cls:'text-brand-600 border-l-4 border-brand-400' },
      { label:'Total Recaudado', value:Fmt.money(gR), icon:'💳', cls:'text-emerald-600 border-l-4 border-emerald-400' },
      { label:'Balance', value:Fmt.diff(gD), icon:'📊', cls:(gD<0?'text-alert border-l-4 border-alert':gD>0?'text-warning border-l-4 border-warning':'text-success border-l-4 border-success') }
    ];
    document.getElementById('resumen-container').innerHTML=kpiData.map(k=>`
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex flex-col justify-between min-w-0 gap-3">
        <div class="flex items-center justify-between">
          <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">${k.label}</p>
          <div class="w-9 h-9 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-lg leading-none">${k.icon}</div>
        </div>

  async borrar(id){
    if(!confirm('¿Estás seguro que deseas eliminar este turno? Esta acción es irreversible.')) return;
    await db.collection("rendiciones").doc(id).delete();
    Data.cargar();
  },

  _listaFiltrada(){
    // Obtiene los registros actualmente visibles en la tabla
    const rows=[...document.querySelectorAll('#tbody tr')];
    const ids=rows.map(tr=>{
      const btn=tr.querySelector('button[onclick*="borrar"]');
      if(!btn) return null;
      const m=btn.getAttribute('onclick').match(/'([^']+)'/);
      return m?m[1]:null;
    }).filter(Boolean);
    return ids.map(id=>DB.todos.find(r=>r.id===id)).filter(Boolean);
  },

  exportarExcel(){
    const lista=this._listaFiltrada();
    if(!lista.length) return alert('No hay registros visibles para exportar.');

    const fecha=new Date().toISOString().split('T')[0];
    const wb=XLSX.utils.book_new();

    // ── Hoja 1: Datos ──
    const encabezados=['Fecha','Empleado','Turno','Venta Islas ($)','Recaudado ($)','Diferencia ($)','Estado','Efectivo ($)','Créditos ($)','Tarjetas ($)','Copiloto ($)','App Shell/Card ($)','Observaciones'];

      r.fecha||'',
      r.nombre||'',
      r.turno||'',
      Number(r.totalIslas||0),
      Number(r.totalRecaudado||0),
      Number(r.diferencia||0),
      r.diferencia<0?'Faltante':r.diferencia>0?'Sobrante':'Cuadrado',
      Number(r.totalDepositos||0),
      Number(r.totalCreditos||0),
      Number(r.totalTarjetas||0),
      Number(r.totalCopiloto||0),
      Number((r.totalShellCard||0))+(Number(r.totalAppShell||0)),
      r.observaciones||''
    ]);

    // Fila de totales
    const totV=lista.reduce((s,r)=>s+Number(r.totalIslas||0),0);
    const totR=lista.reduce((s,r)=>s+Number(r.totalRecaudado||0),0);
    const totD=lista.reduce((s,r)=>s+Number(r.diferencia||0),0);

    const totCo=lista.reduce((s,r)=>s+Number(r.totalCopiloto||0),0);
    const totSh=lista.reduce((s,r)=>s+(Number(r.totalShellCard||0)+Number(r.totalAppShell||0)),0);
    const filaTotal=['TOTAL',`${lista.length} turnos`,'',totV,totR,totD,'',totEf,totCr,totTj,totCo,totSh,''];

    const wsData=[encabezados,...filas,filaTotal];
    const ws=XLSX.utils.aoa_to_sheet(wsData);

    // Anchos de columna
    ws['!cols']=[{wch:12},{wch:22},{wch:8},{wch:14},{wch:14},{wch:14},{wch:11},{wch:13},{wch:13},{wch:13},{wch:12},{wch:16},{wch:30}];

    // Estilos de encabezado
    const hdrStyle={font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:'0284C7'}},alignment:{horizontal:'center',vertical:'center'},border:{bottom:{style:'medium',color:{rgb:'0369A1'}}}};
    encabezados.forEach((_,ci)=>{
      const cell=XLSX.utils.encode_cell({r:0,c:ci});
      if(ws[cell]) ws[cell].s=hdrStyle;
    });

    // Estilos por fila de datos
    filas.forEach((fila,ri)=>{
      const estado=fila[6];
      const bgColor=estado==='Faltante'?'FEE2E2':estado==='Sobrante'?'FEF3C7':'D1FAE5';
      const difColor=estado==='Faltante'?'DC2626':estado==='Sobrante'?'D97706':'059669';
      fila.forEach((_,ci)=>{
        const cell=XLSX.utils.encode_cell({r:ri+1,c:ci});
        if(!ws[cell]) return;
        const isNum=[3,4,5,7,8,9,10,11].includes(ci);
        const isDif=ci===5;
        const isEst=ci===6;
        ws[cell].s={
          font:{sz:9,bold:isEst||isDif,color:{rgb:isDif?difColor:'000000'}},
          fill:{fgColor:{rgb:isEst?bgColor:(ri%2===0?'F8FAFC':'FFFFFF')}},
          alignment:{horizontal:isNum?'right':isEst?'center':'left'},
          numFmt:isNum?'#,##0':undefined,
          border:{bottom:{style:'thin',color:{rgb:'E2E8F0'}}}
        };
        if(isNum) ws[cell].z='#,##0';
      });
    });

    // Fila de totales
    const totalRow=filas.length+1;
    filaTotal.forEach((_,ci)=>{
      const cell=XLSX.utils.encode_cell({r:totalRow,c:ci});
      if(!ws[cell]) return;
      const isNum=[3,4,5,7,8,9,10,11].includes(ci);
      ws[cell].s={font:{bold:true,sz:10,color:{rgb:'0F172A'}},fill:{fgColor:{rgb:'E2E8F0'}},alignment:{horizontal:isNum?'right':'left'},border:{top:{style:'medium',color:{rgb:'94A3B8'}}}};
      if(isNum) ws[cell].z='#,##0';
    });

    // Congelar primera fila
    ws['!freeze']={xSplit:0,ySplit:1};

    XLSX.utils.book_append_sheet(wb,ws,'Auditoría');

    // ── Hoja 2: Resumen ──
    const ws2=XLSX.utils.aoa_to_sheet([
      ['REPORTE DE AUDITORÍA — ESTACIÓN DIGITAL'],
      [''],
      ['Generado',fecha],
      ['Total turnos',lista.length],
      [''],
      ['RESUMEN FINANCIERO'],
      ['Venta Total Islas',totV],
      ['Total Recaudado',totR],
      ['Balance General',totD],
      [''],
      ['DESGLOSE RECAUDACIÓN'],
      ['Efectivo',totEf],
      ['Créditos',totCr],
      ['Tarjetas',totTj],
      ['Copiloto',totCo],
      ['App Shell / Shell Card',totSh],
      [''],
      ['ESTADOS'],
      ['Cuadrado',lista.filter(r=>r.diferencia==0).length],
      ['Faltante',lista.filter(r=>r.diferencia<0).length],
      ['Sobrante',lista.filter(r=>r.diferencia>0).length],
    ]);
    ws2['!cols']=[{wch:24},{wch:18}];
    // Título
    ['A1'].forEach(ref=>{ if(ws2[ref]) ws2[ref].s={font:{bold:true,sz:14,color:{rgb:'0284C7'}}}; });
    // Secciones
    ['A6','A11','A18'].forEach(ref=>{ if(ws2[ref]) ws2[ref].s={font:{bold:true,sz:10,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'0284C7'}}}; });
    // Números
    [6,7,8,11,12,13,14,15].forEach(ri=>{
      const cell=XLSX.utils.encode_cell({r:ri,c:1});
      if(ws2[cell]){ ws2[cell].z='#,##0'; }
    });
    XLSX.utils.book_append_sheet(wb,ws2,'Resumen');

    XLSX.writeFile(wb,`Auditoria_Shell_${fecha}.xlsx`);
  },

/* Filters */
const Filters = {
  aplicar(){
    const nom=document.getElementById('f-nombre').value.trim().toLowerCase();
    const mes=document.getElementById('f-mes').value;
    const año=document.getElementById('f-año').value;
    const estado=document.getElementById('f-estado').value;
    const turno=document.getElementById('f-turno').value;

    let lista=DB.todos.filter(r=>{
      if(nom&&!(r.nombre||'').toLowerCase().includes(nom)) return false;
      if(turno&&r.turno!==turno) return false;
      const f=r.fecha||'';
      let rMes='',rAño='';
      if(f.includes('-')){ const p=f.split('-'); rAño=p[0]; rMes=p[1]; }
      if(mes&&rMes!==mes) return false;
      if(año&&rAño!==año) return false;
      if(estado){
        const d=Number(r.diferencia||0);
        if(estado==='cuadrado'&&Math.abs(d)>=1) return false;
        if(estado==='faltante'&&d>=0) return false;
        if(estado==='sobrante'&&d<=0) return false;
      }
      return true;
    });

    lista.sort((a,b)=>{
      let va=a[Data.sortCol]??'', vb=b[Data.sortCol]??'';
      if(Data.sortCol==='fechaGuardado'){ va=a.fechaGuardado?.seconds||0; vb=b.fechaGuardado?.seconds||0; }
      if(typeof va==='number'&&typeof vb==='number') return Data.sortDir*(va-vb);
      return Data.sortDir*String(va).localeCompare(String(vb));
    });

    Data.render(lista);
    Data.calcResumen(lista);
  },

  limpiar(){
    document.getElementById('f-nombre').value='';
    document.getElementById('f-mes').value='';
    document.getElementById('f-año').value='';
    document.getElementById('f-estado').value='';
    document.getElementById('f-turno').value='';
    this.aplicar();
  }
};
